<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Proyectos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .header p {
      color: #666;
      font-size: 15px;
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 560px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: #1a1a1a;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card:hover {
      background: #f0f0f0;
      border-color: #1db954;
      transform: translateY(-2px);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      background: #e8f5e9;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #1db954;
      flex-shrink: 0;
    }

    .card-content {
      min-width: 0;
    }

    .card-content h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .card-content p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .card-arrow {
      margin-left: auto;
      color: #999;
      font-size: 14px;
      flex-shrink: 0;
    }

    .card:hover .card-arrow {
      color: #1db954;
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Mis Proyectos</h1>
    <p>Apps y herramientas</p>
  </div>

  <div class="grid">
    <a class="card" href="/app-music/">
      <div class="card-icon"><i class="fas fa-music"></i></div>
      <div class="card-content">
        <h2>Mi Cancionero</h2>
        <p>Reproductor de m&uacute;sica para Alexa Skill</p>
      </div>
      <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
    </a>
  </div>

  <div class="footer">
    <span id="year"></span> &middot; derbydx
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
